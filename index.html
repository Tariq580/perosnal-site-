    <template id="tpl-article-1">
<p class="cmd-echo">$ cat ~/writing/2026-01-30-failures.txt</p>
<article class="full-article">
  <h2>i spent my teens chasing dreams that all failed. Was it worth it?</h2>
  <p class="article-meta">January 30, 2026</p>
  
  <div class="article-body">
    <p>Everyone says i wasted my high school years.
i was too serious. i didn&#39;t enjoy. i started early. 
Maybe they&#39;re right. Maybe they&#39;re wrong.
Read my story, then tell me what you think:</p>
<p>it was October 2023, i was in my first year of high school here in Japan. 
i hated school and every subject, even the ones I liked during my junior and elementary school, like math and history, probably because of the language barrier I had at the time, since it was just a year since I&#39;d come to Japan. </p>
<p>i was scrolling social media like every other teenager my age, but something was wrong. But what? 
My Instagram and TikTok feeds were all full of videos of millionaires like Iman Gadzi, Davie Fogarty etc talking about how easy it is to get rich by using their frameworks and methods, and a bunch of other people rating online businesses on a daily basis. 
they would make it sound so easy that every minute I&#39;d spend on my phone was like &quot;wtf am I doing with my life&quot;  but I was only 16.</p>
<p>it seemed so easy: </p>
<p>open shopify -&gt; create an account and get ur ready to publish site in minutes 
open Ali express -&gt; connect it with your shopify store and that&#39;s it!
you&#39;re officially an online business owner. </p>
<p>finaly I decided to get into this world and get rich like everyone else before turning 20. 
first, what i did was buy an online course worth 200$ to learn about these online things like dropshipping, affiliate marketing, content creation... 
second i had $200 left of my savings which i spent on Shopify subscription, domain, tiktok and facebook ads. </p>
<p>i would get stuck daily trying to make ads, but there was no result at all. 
after spending about 4 to 5 months in this dream of becoming the first millionaire in my family, i canceled my Shopify subscription, domain etc 
i sat down and was like:<br>&quot;Maybe dropshipping is not meant for me&quot; 
&quot;Maybe I am too late&quot;<br>so I gave up.
but that guy who sold me his course? still selling it. probably rich by now. </p>
<p>Then it was the summer of 2024.
High schools were off, and I was thinking about starting sth else, and this time i came across Amazon FBA, but after research, I found that it requires serious capital to start.</p>
<p>After thinking a lot i asked my dad for $2k to start selling stuff under my own brand name 
He agreed. i found a supplier on Alibaba and decided to sell water bottles as my first product. chose usa as my primary market.</p>
<p>the products reached Amazon warehouses in usa and congrats to me, I was officially a brand owner at 17. </p>
<p>i was so happy that my family would make fun of me at home.<br>Then there was no sale for weeks again. i waited week after week for my first sale until one day that wish was fulfilled.</p>
<p>however that was my first and last sale because after that i was just looking at a blank dashboard for months. </p>
<p>idk why that failed: 
private label?     wrong product?     wrong market?   starting too big? 
but anyway, i then paid amazon to throw away them bottles so i could get rid of their costs, and this was the end of being a brand owner. 
still in debt to my dad :) </p>
<p>then it was January 2025.</p>
<p>new year, new attempt.
this time, decided to go into the content creation world.
chose X and created my account.</p>
<p>thinking that I&#39;d be writing about my interests such as programming, AI, and gain followers but after discovering communities such as build in public and finding accounts like @marclou, @jackfriks talking about a new term called &quot; vibe coding &quot; and how people can make money with it by creating quick mvps and production-ready apps, i decided to give it a try.
started with lovable. created a meme website called snapmeme and posted about it on my X accounts and communities.</p>
<p>but every post would have about 10 to 30 views. 
so as no one knew about this snapmeme, so-called my startup i didnt have any other way but to give up on this too </p>
<p>i didnt give up on writing tweets though, despite knowing that nobody would really see them. I had about 200 followers at that time. now i have 250 😇.</p>
<p>but as i was just writing tweets and not building anything, it didn&#39;t feel alright- i decided to learn programming from scratch. </p>
<p>i bought a 53h python course on Udemy. watched it for a few weeks but seeing people claiming that they made.....money with their vibe coded app built in a weekend, I quit that course too and decided to go back to vibe coding and this time build an app. </p>
<p>still building it. </p>
<p>i still do not know if what I&#39;m doing is right or wrong or if this time I&#39;m gonna succeed or not but I will keep going because of this quote:
( if you&#39;re tired of starting over, stop giving up.) </p>
<p>now reflecting on this journey full of failures and give-ups, i sometimes think;
What if i had started another dropshipping store and not given up? 
What if i had chosen another product and sold it on amazon instead of quitting it all 
What if i had not quit that python course and finished it till the end? 
and .......</p>
<p>but because of these experiences: 
just because someone in some part of the world got rich doing X doesn&#39;t mean you can&#39;t, and just because they succeeded doesn&#39;t mean you will.</p>
<p>i now know that figuring out is an important skill, no matter what you do, because most of the time, the reason I&#39;d quit was getting stuck at sth and not trying to figure it out.</p>
<p>I&#39;m able to use/work with tools and apps like creating a store on Shopify, using WordPress, Lovable, Cursor, Codex, Claude, Canva, Gumroad, claude, chatgpt, gemini, git and github, VS Code, Xcode...  that otherwise wouldn&#39;t have known or used them at all if it wasn&#39;t for these experiments.
 i now know that not everything is as easy and plain as it looks on social media and in the &quot; best businesses to start in ...... year &quot; videos.</p>
<p>So was it worth it? 
well i don&#39;t really know, but i do think i did well by experiencing different things and skills, as they helped me:
 develop a sense of curiosity
 the courage to start something new
and that failures aren&#39;t always bad; sometimes they just open your eyes to a new world. </p>

  </div>
</article>

    <!-- ARTICLE 2 -->
    <template id="tpl-article-2">
<p class="cmd-echo">$ cat ~/writing/2026-01-08-education.txt</p>
<article class="full-article">
  <h2>Is This Really Education?</h2>
  <p class="article-meta">January 8, 2026</p>
  
  <div class="article-body">
    <p>Right now, I am sitting here in a physics class. The teacher has been talking for over 40 minutes, but none of the students, including me, seem to care about what he is saying.</p>
<p>None of us wants to be in this class, and we&#39;re clearly not interested. Yet somehow, we&#39;ve been placed here, either by our parents or by society.</p>
<p>And I don&#39;t think this is just happening here in Japan, I believe it&#39;s happening in many countries around the world. The education system is broken and outdated.</p>
<p>The other day, I saw a student at our school who didn&#39;t even know how to use ChatGPT. Why? Because we&#39;re not being taught about tools like that.</p>
<p>Sometimes I wonder: What if schools taught things like coding, content creation, AI, and communication skills?</p>
<p>So the real question is: For how long will education continue like this?</p>

  </div>
</article>

    <template id="tpl-article-3">

<article class="full-article">
  <h2>On friction in tools</h2>
  <p class="article-meta">January 6, 2026</p>
  
  <div class="article-body">
    <p>Friction isn&#39;t always bad. Some friction creates space for thought.</p>
<p>When everything is instant, we lose the pause. The moment to reconsider. The chance to change our minds before committing.</p>
<p>The best tools know when to slow you down.</p>

  </div>
